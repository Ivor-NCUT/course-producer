<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Course Producer 课程制作人</title>
  <desc id="desc">把散落素材持续做成一门完整课程</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="20" x2="1110" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="0.52" stop-color="#17253A"/>
      <stop offset="1" stop-color="#0D3440"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="96" x2="966" y2="388" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6C76E"/>
      <stop offset="1" stop-color="#62D4C7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1200" height="480" rx="32" fill="url(#bg)"/>
  <circle cx="1060" cy="72" r="120" fill="#35C6B7" fill-opacity="0.12" filter="url(#glow)"/>
  <circle cx="130" cy="410" r="140" fill="#F6C76E" fill-opacity="0.1" filter="url(#glow)"/>

  <g opacity="0.2" stroke="#D9F2EE">
    <path d="M56 72H1144"/>
    <path d="M56 408H1144"/>
    <path d="M88 48V432"/>
    <path d="M1112 48V432"/>
  </g>

  <g transform="translate(89 98)">
    <rect x="0" y="0" width="70" height="70" rx="20" fill="#F6C76E"/>
    <path d="M20 22H51M20 35H44M20 48H38" stroke="#17253A" stroke-width="6" stroke-linecap="round"/>
    <circle cx="50" cy="49" r="10" fill="#17253A"/>
    <path d="M47 49L50 52L56 45" stroke="#F6C76E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="182" y="126" fill="#F6C76E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="700" letter-spacing="5">COURSE PRODUCER</text>
  <text x="88" y="238" fill="#F8FAFC" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="78" font-weight="760">课程制作人</text>
  <rect x="89" y="275" width="698" height="4" rx="2" fill="url(#accent)"/>
  <text x="88" y="335" fill="#DCE7EE" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="30" font-weight="450">把散落素材，持续做成一门完整课程</text>
  <text x="89" y="380" fill="#8FA9B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19">可恢复 · 可追溯 · 可审校 · 可交付</text>

  <g transform="translate(846 110)">
    <path d="M46 40H154M154 40L207 92M207 92V180" stroke="#78A7AE" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 9"/>
    <rect x="0" y="0" width="92" height="80" rx="18" fill="#20374A" stroke="#F6C76E" stroke-width="2"/>
    <text x="46" y="48" text-anchor="middle" fill="#F6C76E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="650">素材</text>
    <rect x="108" y="0" width="92" height="80" rx="18" fill="#20374A" stroke="#A9D5CE" stroke-width="2"/>
    <text x="154" y="48" text-anchor="middle" fill="#DDF5F0" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="650">课纲</text>
    <rect x="161" y="92" width="92" height="80" rx="18" fill="#1E4A50" stroke="#62D4C7" stroke-width="2"/>
    <text x="207" y="140" text-anchor="middle" fill="#DDFBF7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="650">成课</text>
    <circle cx="207" cy="212" r="10" fill="#62D4C7"/>
    <circle cx="207" cy="212" r="20" stroke="#62D4C7" stroke-opacity="0.28" stroke-width="2"/>
  </g>
