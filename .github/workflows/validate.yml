name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python3 tools/quick_validate.py skills/*
      - run: node tools/validate-skills.mjs
      - run: node tools/validate-evals.mjs
      - run: node --test tests/*.test.mjs
      - run: node tools/build.mjs
